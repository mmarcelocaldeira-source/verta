<svg width="1000" height="1000" viewBox="0 0 1000 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes countUp {
      from { stroke-dashoffset: 400; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    .stagger-in {
      animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    
    .compliance-pulse {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>

  <!-- Background -->
  <rect width="1000" height="1000" fill="#0B0E11"/>
  
  <!-- Content Wrapper -->
  <g class="stagger-in delay-1">
    <!-- Header -->
    <text x="60" y="80" fill="white" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="28" font-weight="700">Cibersegurança</text>
    <text x="60" y="120" fill="#64748B" font-family="Inter, sans-serif" font-size="14" letter-spacing="0.02em" style="text-transform: uppercase;">Última atualização: 10 meses atrás</text>
    
    <!-- Tabs -->
    <g transform="translate(60, 170)">
      <text x="0" y="0" fill="#7F99F5" font-family="Inter, sans-serif" font-size="16" font-weight="600">Score</text>
      <rect x="0" y="10" width="44" height="2" fill="#7F99F5" rx="1"/>
      <text x="90" y="0" fill="#475569" font-family="Inter, sans-serif" font-size="16" font-weight="500">Planos de Ação</text>
      <text x="250" y="0" fill="#475569" font-family="Inter, sans-serif" font-size="16" font-weight="500">RRI</text>
      <text x="320" y="0" fill="#475569" font-family="Inter, sans-serif" font-size="16" font-weight="500">Controles</text>
    </g>
  </g>

  <!-- Left Card: Score -->
  <g class="stagger-in delay-2">
    <rect x="60" y="240" width="420" height="700" rx="24" fill="#141414" stroke="rgba(255,255,255,0.05)"/>
    <text x="100" y="300" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-size="20" font-weight="600">Score</text>
    <text x="100" y="330" fill="#888" font-family="Inter, sans-serif" font-size="13">Neste gráfico, você encontra o seu score de maturidade geral.</text>
    
    <!-- Compliance Alert -->
    <g transform="translate(100, 370)" class="compliance-pulse">
      <rect width="340" height="80" rx="12" fill="rgba(185, 28, 28, 0.1)" stroke="rgba(185, 28, 28, 0.3)"/>
      <path d="M25 40V46M25 52H25.01M37 46C37 52.6274 31.6274 58 25 58C18.3726 58 13 52.6274 13 46C13 39.3726 18.3726 34 25 34C31.6274 34 37 39.3726 37 46Z" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
      <text x="55" y="45" fill="#EF4444" font-family="Inter, sans-serif" font-size="13" font-weight="600">Você não está em Compliance:</text>
      <text x="55" y="62" fill="#888" font-family="Inter, sans-serif" font-size="12">2 controles obrigatórios não atendidos</text>
    </g>

    <!-- Scale -->
    <g transform="translate(300, 500)">
      <rect width="140" height="44" rx="8" fill="#F1C40F" fill-opacity="1"/>
      <text x="15" y="28" fill="black" font-family="Inter, sans-serif" font-size="18" font-weight="700">C</text>
      <text x="45" y="27" fill="black" font-family="Inter, sans-serif" font-size="14" font-weight="600">60% - 41%</text>
      <rect x="-4" y="-4" width="148" height="52" rx="10" fill="none" stroke="#F1C40F" stroke-width="1.5" stroke-dasharray="4 4"/>
    </g>

    <!-- Main Metric -->
    <text x="100" y="650" fill="#64748B" font-family="Inter, sans-serif" font-size="14" font-weight="500">Baseline: 68%</text>
    <text x="100" y="770" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-size="120" font-weight="700">60%</text>
    <text x="100" y="810" fill="#64748B" font-family="Inter, sans-serif" font-size="13" font-weight="400">Média Setor Financeiro 2025: 67%</text>
  </g>

  <!-- Right Card: Risk -->
  <g class="stagger-in delay-3">
    <rect x="520" y="240" width="420" height="700" rx="24" fill="#141414" stroke="rgba(255,255,255,0.05)"/>
    <text x="560" y="300" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-size="18" font-weight="600">Potencial Risco e Impacto</text>
    <text x="560" y="330" fill="#888" font-family="Inter, sans-serif" font-size="13">Avaliação contínua de exposição financeira.</text>

    <!-- Risk Bar -->
    <g transform="translate(560, 420)">
      <rect width="340" height="24" rx="12" fill="#222"/>
      <linearGradient id="g-risk" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#4CAF50"/>
        <stop offset="50%" stop-color="#F1C40F"/>
        <stop offset="100%" stop-color="#FF4D4D"/>
      </linearGradient>
      <rect width="340" height="24" rx="12" fill="url(#g-risk)" fill-opacity="0.9"/>
      <text x="0" y="-12" fill="#4CAF50" font-family="Inter, sans-serif" font-size="11" font-weight="600">BAIXA</text>
      <text x="150" y="-12" fill="#F1C40F" font-family="Inter, sans-serif" font-size="11" font-weight="600">MÉDIA</text>
      <text x="300" y="-12" fill="#FF4D4D" font-family="Inter, sans-serif" font-size="11" font-weight="600">ALTA</text>
      
      <!-- Pointer -->
      <path d="M280 32 L288 44 L272 44 Z" fill="#FF4D4D"/>
    </g>

    <!-- Risk Metrics -->
    <g transform="translate(560, 580)">
      <text x="0" y="0" fill="#888" font-family="Inter, sans-serif" font-size="16" font-weight="500">Risco atual</text>
      <text x="0" y="80" fill="#FF4444" font-family="Plus Jakarta Sans, sans-serif" font-size="84" font-weight="700">82%</text>
      <text x="0" y="110" fill="#64748B" font-family="Inter, sans-serif" font-size="12">Média Setor Financeiro 2025: 76%</text>

      <text x="0" y="180" fill="#888" font-family="Inter, sans-serif" font-size="16" font-weight="500">Impacto financeiro</text>
      <text x="0" y="260" fill="white" font-family="Plus Jakarta Sans, sans-serif" font-size="72" font-weight="700">14.5</text>
      <text x="160" y="260" fill="#888" font-family="Inter, sans-serif" font-size="18" font-weight="500">USD mi</text>
      <text x="0" y="295" fill="#64748B" font-family="Inter, sans-serif" font-size="12">Média Setor Financeiro 2025: USD 12M</text>
    </g>
  </g>
</svg>
